<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>EzRecruit ROI Calculator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            teal: { brand: "#0F9D8C", soft: "#E6F7F5", muted: "#CCFBF1", deep: "#0B7A6D" },
            navy: { brand: "#0F172A" },
            surface: { page: "#F4F6F9", card: "#FFFFFF", muted: "#F8FAFC" },
          },
          fontFamily: { sans: ["Inter", "system-ui", "sans-serif"] },
          boxShadow: {
            card: "0 1px 3px rgba(15, 23, 42, 0.06), 0 4px 16px rgba(15, 23, 42, 0.04)",
            slider: "0 2px 8px rgba(15, 157, 140, 0.25), 0 0 0 1px rgba(15, 157, 140, 0.1)",
          },
        },
      },
    };
  </script>
  <style>
    html, body, #root { height: 100%; }
    body {
      background: #F4F6F9;
      -webkit-tap-highlight-color: transparent;
    }
    @media (min-width: 901px) {
      html, body, #root { overflow: hidden; }
      .inputs-panel { overflow: hidden; }
    }
    @media (max-width: 900px) {
      html, body, #root {
        height: auto;
        min-height: 100dvh;
        overflow-x: hidden;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
      }
      .inputs-panel { overflow: visible; }
      .r-slider { height: 8px; }
      .r-slider::-webkit-slider-thumb { width: 24px; height: 24px; }
      .r-slider::-moz-range-thumb { width: 24px; height: 24px; }
    }
    .r-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      border-radius: 999px;
      background: linear-gradient(90deg, #0F9D8C var(--pct, 0%), #E2E8F0 var(--pct, 0%));
      outline: none;
      cursor: pointer;
    }
    .r-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #FFFFFF;
      border: 2px solid #0F9D8C;
      box-shadow: 0 2px 8px rgba(15, 157, 140, 0.35);
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .r-slider::-webkit-slider-thumb:hover { transform: scale(1.15); box-shadow: 0 4px 12px rgba(15, 157, 140, 0.45); }
    .r-slider::-webkit-slider-thumb:active { transform: scale(1.08); }
    .r-slider::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #FFFFFF;
      border: 2px solid #0F9D8C;
      box-shadow: 0 2px 8px rgba(15, 157, 140, 0.35);
      cursor: pointer;
    }
    .r-slider:focus { outline: none; }
    .r-slider:focus::-webkit-slider-thumb { box-shadow: 0 0 0 4px rgba(15, 157, 140, 0.15), 0 4px 12px rgba(15, 157, 140, 0.35); }
    @keyframes pop {
      0% { transform: scale(0.96); opacity: 0.7; }
      100% { transform: scale(1); opacity: 1; }
    }
    .pop { animation: pop 0.25s ease-out; }
    .chart-bar-fill { transition: width 0.55s cubic-bezier(.22,1,.36,1); }
    .results-green-card {
      background: linear-gradient(165deg, #0F766E 0%, #0B5E54 45%, #094A44 100%);
      box-shadow: 0 8px 32px rgba(11, 94, 84, 0.35);
    }
    .results-inner {
      background: rgba(0, 0, 0, 0.18);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
  </style>
</head>
<body class="font-sans text-navy-brand antialiased">
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useMemo, useState, useEffect, useRef } = React;

    const WORKING_DAYS_DEFAULT = 22;
    const HOURS_SAVED_PER_DAY = 1.5;
    const EZRECRUIT_COST_PER_USER = 1200;
    const PRODUCTIVE_HOURS_PER_DAY = 8;

    function formatIndianCurrency(value) {
      return new Intl.NumberFormat("en-IN", {
        style: "currency", currency: "INR", maximumFractionDigits: 0,
      }).format(Math.round(value));
    }

    function formatIndianNumber(value) {
      return new Intl.NumberFormat("en-IN", { maximumFractionDigits: 0 }).format(Math.round(value));
    }

    function SectionBadge({ num, label, color = "teal" }) {
      const colors = {
        teal: "bg-teal-soft text-teal-brand",
        blue: "bg-blue-50 text-blue-600",
        slate: "bg-slate-100 text-slate-600",
      };
      return (
        <div className="mb-2 flex items-center gap-2">
          <span className={`rounded-md px-1.5 py-0.5 text-[9px] font-semibold uppercase tracking-wide ${colors[color]}`}>
            {num}
          </span>
          <span className="text-[11px] font-semibold text-slate-700">{label}</span>
        </div>
      );
    }

    function EzRecruitFixedField({ label, value, note }) {
      return (
        <div className="rounded-lg border border-teal-brand/20 bg-teal-soft/50 px-3 py-2.5 sm:px-3.5">
          <div className="mb-1.5 flex flex-col gap-1.5 sm:flex-row sm:items-center sm:justify-between sm:gap-2">
            <label className="text-[11px] font-medium leading-snug text-slate-600 sm:text-[10px]">{label}</label>
            <span className="w-fit shrink-0 rounded-md bg-white px-2 py-0.5 text-[10px] font-bold tabular-nums text-teal-brand shadow-sm sm:max-w-[55%] sm:text-right">
              {value}
            </span>
          </div>
          <p className="text-[10px] leading-relaxed text-teal-brand/80 sm:text-[9px]">{note}</p>
        </div>
      );
    }

    function SliderField({ label, value, onChange, min, max, step = 1, unit, formatDisplay }) {
      const pct = ((value - min) / (max - min)) * 100;
      const display = formatDisplay ? formatDisplay(value) : `${value}${unit ? ` ${unit}` : ""}`;
      return (
        <div>
          <div className="mb-2 flex flex-col gap-1 sm:mb-1.5 sm:flex-row sm:items-center sm:justify-between sm:gap-2">
            <label className="text-[11px] font-medium text-slate-500 sm:text-[10px]">{label}</label>
            <span className="w-fit rounded-md bg-teal-soft px-2 py-0.5 text-[11px] font-bold tabular-nums text-teal-brand sm:px-1.5 sm:text-[10px]">
              {display}
            </span>
          </div>
          <input
            type="range"
            min={min}
            max={max}
            step={step}
            value={value}
            onChange={(e) => onChange(Number(e.target.value))}
            className="r-slider"
            style={{ "--pct": `${pct}%` }}
          />
          <div className="mt-0.5 flex justify-between text-[8px] font-medium text-slate-300">
            <span>{formatDisplay ? formatDisplay(min) : min}</span>
            <span>{formatDisplay ? formatDisplay(max) : max}</span>
          </div>
        </div>
      );
    }

    function ResultsGreenCard({ r, popKey, workingDays }) {
      const fte = (r.timeSavedPerYear / (PRODUCTIVE_HOURS_PER_DAY * workingDays * 12)).toFixed(1).replace(/\.0$/, "");
      const total = Math.max(r.annualRecruitmentCostSaved, 1);
      const netPct = (r.netSavings / total) * 100;
      const costPct = (r.annualEzRecruitCost / total) * 100;

      return (
        <div className="results-green-card flex min-h-0 flex-col rounded-2xl p-4 text-white sm:rounded-3xl sm:p-5 md:h-full md:p-6">
          {/* Hours hero */}
          <div className="mb-4 shrink-0 sm:mb-5">
            <div className="mb-1 flex flex-col gap-0.5 sm:flex-row sm:items-center sm:justify-between">
              <span className="text-xs font-medium text-white/90 sm:text-sm">With EzRecruit you are saving</span>
              <span className="text-[10px] font-medium text-white/50">hrs/yr</span>
            </div>
            <div className="flex flex-wrap items-end gap-x-3 gap-y-1">
              <p className="text-[clamp(2.25rem,6vw,3rem)] font-extrabold leading-none tracking-tight">
                {formatIndianNumber(r.timeSavedPerYear)}
              </p>
              <p className="pb-1 text-sm text-white/60">total working hours</p>
            </div>
            <p className="mt-2.5 flex items-start gap-1.5 text-[11px] leading-relaxed text-white/55">
              <svg className="mt-0.5 shrink-0 opacity-70" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/>
              </svg>
              Equivalent to saving <strong className="font-semibold text-white">{fte} full-time employees</strong>&apos; yearly bandwidth.
            </p>
          </div>

          {/* Breakdown + chart */}
          <div className="results-inner mb-4 shrink-0 rounded-2xl p-4">
            {/* Stacked savings chart */}
            <div className="mb-4">
              <p className="mb-2 text-[10px] font-semibold uppercase tracking-wide text-white/50">Savings split</p>
              <div className="flex h-2.5 overflow-hidden rounded-full bg-white/10">
                <div className="chart-bar-fill bg-[#5EEAD4]" style={{ width: `${netPct}%` }} title="Net savings" />
                <div className="chart-bar-fill bg-[#FB923C]" style={{ width: `${costPct}%` }} title="EzRecruit cost" />
              </div>
              <div className="mt-2 flex gap-4 text-[9px] text-white/50">
                <span className="flex items-center gap-1"><i className="inline-block h-1.5 w-1.5 rounded-full bg-[#5EEAD4]" /> Net</span>
                <span className="flex items-center gap-1"><i className="inline-block h-1.5 w-1.5 rounded-full bg-[#FB923C]" /> Cost</span>
              </div>
            </div>

            <div className="space-y-2.5 text-sm">
              <div className="flex flex-col gap-0.5 sm:flex-row sm:items-center sm:justify-between sm:gap-3">
                <span className="text-white/70">Total Saved</span>
                <span className="font-bold tabular-nums text-white">{formatIndianCurrency(r.annualRecruitmentCostSaved)}</span>
              </div>
              <div className="flex flex-col gap-0.5 sm:flex-row sm:items-center sm:justify-between sm:gap-3">
                <span className="text-white/70">Cost of EzRecruit</span>
                <span className="font-bold tabular-nums text-[#FDBA74]">{formatIndianCurrency(r.annualEzRecruitCost)}</span>
              </div>
            </div>

            <div key={popKey} className="pop mt-3 flex flex-col gap-1 sm:flex-row sm:items-center sm:justify-between sm:gap-3">
              <span className="font-semibold text-white">Net You Saved</span>
              <span className="text-lg font-extrabold tabular-nums text-[#5EEAD4] sm:text-xl md:text-2xl">
                {formatIndianCurrency(r.netSavings)}
              </span>
            </div>
          </div>

          {/* Footer */}
          <div className="mt-auto shrink-0">
            <a
              href="https://ezrecruit.in"
              target="_blank"
              rel="noopener noreferrer"
              className="flex w-full min-h-[44px] items-center justify-center gap-2 rounded-xl bg-white py-3.5 text-sm font-bold text-[#0B5E54] shadow-sm transition active:scale-[0.98] hover:bg-white/95 hover:shadow-md sm:py-3"
            >
              Get Started with EzRecruit
              <span aria-hidden="true">→</span>
            </a>
          </div>
        </div>
      );
    }

    function EzRecruitROICalculator() {
      const [recruiters, setRecruiters] = useState(10);
      const [avgCost, setAvgCost] = useState(40000);
      const [workingDays, setWorkingDays] = useState(WORKING_DAYS_DEFAULT);

      const r = useMemo(() => {
        const n = Math.max(0, recruiters);
        const cost = Math.max(0, avgCost);
        const days = Math.max(1, workingDays);
        const timeSavedPerYear = n * HOURS_SAVED_PER_DAY * days * 12;
        const annualRecruitmentCostSaved = n * cost * 12 * (HOURS_SAVED_PER_DAY / PRODUCTIVE_HOURS_PER_DAY);
        const annualEzRecruitCost = n * EZRECRUIT_COST_PER_USER * 12;
        const netSavings = annualRecruitmentCostSaved - annualEzRecruitCost;
        return { timeSavedPerYear, annualRecruitmentCostSaved, annualEzRecruitCost, netSavings, workingDaysPerMonth: days };
      }, [recruiters, avgCost, workingDays]);

      const [popKey, setPopKey] = useState(0);
      const firstRender = useRef(true);
      useEffect(() => {
        if (firstRender.current) { firstRender.current = false; return; }
        setPopKey((k) => k + 1);
      }, [r.netSavings]);

      return (
        <div className="flex min-h-[100dvh] items-stretch justify-center p-3 pb-[max(0.75rem,env(safe-area-inset-bottom))] pt-[max(0.75rem,env(safe-area-inset-top))] sm:p-4 md:h-full md:min-h-0 md:items-center md:p-5">
          <div className="flex w-full max-w-5xl flex-col overflow-visible rounded-2xl border border-slate-200/80 bg-surface-card shadow-card md:h-full md:max-h-[min(100dvh,780px)] md:overflow-hidden">

            {/* Top bar */}
            <header className="flex shrink-0 items-center justify-between gap-3 border-b border-slate-100 px-3 py-3 sm:px-4 sm:py-2.5 md:px-5">
              <img
                src="https://ezrecruit.in/assets/logo-C4ozb_iM.png"
                alt="EzRecruit"
                className="h-8 object-contain sm:h-7"
              />
              <div className="min-w-0 text-right">
                <p className="text-[9px] font-semibold uppercase tracking-widest text-slate-400 sm:text-[10px]">ROI Calculator</p>
                <h1 className="text-sm font-bold text-navy-brand sm:text-base md:text-sm">See Your Savings</h1>
              </div>
            </header>

            {/* Body */}
            <div className="grid flex-1 md:min-h-0 md:grid-cols-[1fr_1.1fr]">

              {/* LEFT — sliders */}
              <div className="inputs-panel flex flex-col justify-center border-b border-slate-100 p-3 sm:p-4 md:min-h-0 md:border-b-0 md:border-r">
                <div className="space-y-3 sm:space-y-2">
                  <div className="rounded-xl border border-slate-100 bg-surface-muted p-3.5 sm:p-3">
                    <SectionBadge num="01" label="Team Details" />
                    <div className="space-y-2.5">
                      <SliderField
                        label="Number of Recruiters"
                        value={recruiters}
                        onChange={setRecruiters}
                        min={1}
                        max={200}
                        step={1}
                      />
                      <SliderField
                        label="Avg Recruiter Cost / Month"
                        value={avgCost}
                        onChange={setAvgCost}
                        min={15000}
                        max={200000}
                        step={1000}
                        formatDisplay={(v) => formatIndianCurrency(v)}
                      />
                    </div>
                  </div>

                  <div className="rounded-xl border border-slate-100 bg-surface-muted p-3.5 sm:p-3">
                    <SectionBadge num="02" label="Time Saved with EzRecruit" color="blue" />
                    <div className="space-y-2.5">
                      <EzRecruitFixedField
                        label="Hours Saved / Recruiter / Day"
                        value="1 hr 30 min or more"
                        note="With EzRecruit, each recruiter saves 1 hour 30 minutes or more every day through streamlined workflow, WhatsApp scheduling, auto candidate tracker, and many more features."
                      />
                      <SliderField
                        label="Working Days / Month"
                        value={workingDays}
                        onChange={setWorkingDays}
                        min={18}
                        max={26}
                        step={1}
                      />
                    </div>
                  </div>

                  <div className="rounded-xl border border-teal-brand/15 bg-teal-soft/30 p-3.5 sm:p-3">
                    <SectionBadge num="03" label="EzRecruit Cost" color="teal" />
                    <EzRecruitFixedField
                      label="Cost per User / Month"
                      value="₹1,200"
                      note="Standard EzRecruit pricing: ₹1,200 per recruiter per month."
                    />
                  </div>
                </div>
              </div>

              {/* RIGHT — results */}
              <div className="bg-surface-muted/50 p-3 sm:p-4 md:min-h-0">
                <ResultsGreenCard r={r} popKey={popKey} workingDays={workingDays} />
              </div>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<EzRecruitROICalculator />);
  </script>
</body>
</html>
